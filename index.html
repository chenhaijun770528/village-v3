<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <style>
/* village-h5 全局样式 */
/* 主题色：绿色乡土风格 #2E7D32 */

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background-color: #f5f5f5;
  color: #333;
  font-size: 14px;
  line-height: 1.5;
}

/* 顶部导航 */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: linear-gradient(135deg, #2E7D32, #4CAF50);
  color: white;
  padding: 12px 16px;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.header-title { font-size: 18px; font-weight: bold; }
.header-back { font-size: 20px; cursor: pointer; padding: 4px 8px; }

/* 主容器 */
.container {
  padding: 60px 16px 80px;
  max-width: 750px;
  margin: 0 auto;
}

/* 搜索栏 */
.search-bar {
  background: white;
  border-radius: 25px;
  padding: 10px 16px;
  margin: 12px 0;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  cursor: pointer;
}

.search-bar input {
  border: none;
  outline: none;
  flex: 1;
  font-size: 14px;
  background: transparent;
}

/* 轮播图 */
.banner-swiper {
  border-radius: 12px;
  overflow: hidden;
  height: 180px;
  margin-bottom: 16px;
}

.banner-swiper img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 功能入口网格 */
.func-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}

.func-item {
  background: white;
  border-radius: 12px;
  padding: 16px 8px;
  text-align: center;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  transition: transform 0.2s;
}

.func-item:active { transform: scale(0.95); }
.func-icon { font-size: 28px; display: block; margin-bottom: 4px; }
.func-text { font-size: 12px; color: #666; }

/* 村庄卡片 */
.section-title {
  font-size: 16px;
  font-weight: bold;
  color: #333;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.village-count { font-size: 12px; color: #999; font-weight: normal; }

.village-card {
  background: white;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  cursor: pointer;
  transition: transform 0.2s;
}

.village-card:active { transform: scale(0.98); }

.village-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}

.village-name { font-size: 16px; font-weight: bold; color: #2E7D32; }
.village-location { font-size: 12px; color: #999; margin-top: 2px; }
.village-population { text-align: right; }
.population-number { font-size: 20px; font-weight: bold; color: #FF9800; }
.population-label { font-size: 11px; color: #999; }

.village-stats {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  padding: 10px;
  background: #f5f5f5;
  border-radius: 8px;
}

.stat-item { flex: 1; display: flex; align-items: center; gap: 6px; }
.stat-icon { font-size: 18px; }
.stat-value { font-size: 14px; font-weight: bold; color: #333; }
.stat-label { font-size: 11px; color: #999; }

.village-desc {
  font-size: 13px;
  color: #666;
  margin-bottom: 12px;
  line-height: 1.6;
}

.village-actions {
  display: flex;
  gap: 8px;
}

.action-btn {
  flex: 1;
  background: #f0f7f0;
  color: #2E7D32;
  border-radius: 20px;
  padding: 6px 0;
  text-align: center;
  font-size: 12px;
  cursor: pointer;
}

.action-btn:active { background: #2E7D32; color: white; }

/* 底部导航 */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 8px 0;
  box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
  z-index: 100;
}

.tab-item {
  text-align: center;
  cursor: pointer;
  padding: 4px 0;
}

.tab-icon { font-size: 24px; display: block; }
.tab-text { font-size: 11px; color: #999; margin-top: 2px; }
.tab-item.active .tab-text { color: #2E7D32; }

/* 表单样式 */
.form-group { margin-bottom: 16px; }
.form-label { font-size: 14px; color: #666; margin-bottom: 6px; display: block; }
.form-input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

.form-input:focus { border-color: #2E7D32; }

.btn-primary {
  width: 100%;
  padding: 12px;
  background: #2E7D32;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

.btn-primary:active { background: #1B5E20; }

/* 卡片详情页 */
.detail-header { margin-bottom: 20px; }
.detail-title { font-size: 22px; font-weight: bold; color: #2E7D32; margin-bottom: 8px; }
.detail-meta { font-size: 12px; color: #999; }

.detail-section {
  background: white;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
}

.detail-section h3 { font-size: 15px; color: #2E7D32; margin-bottom: 10px; }
.detail-section p { font-size: 14px; color: #666; line-height: 1.8; }

/* 图片网格 */
.img-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.img-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; }

/* 空状态 */
.empty-state { text-align: center; padding: 60px 20px; color: #999; }
.empty-icon { font-size: 48px; display: block; margin-bottom: 12px; }

/* Toast提示 */
.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.75);
  color: white;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 9999;
  animation: fadeIn 0.3s;
}

@keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }

/* 加载状态 */
.loading { text-align: center; padding: 20px; color: #999; }

/* 角色选择页 */
.role-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.role-card {
  background: white;
  border-radius: 12px;
  padding: 20px 16px;
  text-align: center;
  cursor: pointer;
  border: 2px solid #e0e0e0;
  transition: all 0.2s;
}

.role-card.selected { border-color: #2E7D32; background: #f0f7f0; }
.role-icon { font-size: 36px; display: block; margin-bottom: 8px; }
.role-name { font-size: 14px; font-weight: bold; color: #333; }

/* 农产品卡片 */
.product-card { background: white; border-radius: 12px; overflow: hidden; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); cursor: pointer; }
.product-card:active { transform: scale(0.98); }
.product-img { width: 100%; height: 160px; object-fit: cover; }
.product-info { padding: 12px; }
.product-name { font-size: 15px; font-weight: bold; color: #333; margin-bottom: 4px; }
.product-price { font-size: 18px; color: #FF9800; font-weight: bold; }
.product-unit { font-size: 12px; color: #999; font-weight: normal; }

/* 商品列表 */
.goods-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.goods-card { background: white; border-radius: 8px; overflow: hidden; }
.goods-img { width: 100%; height: 120px; object-fit: cover; }
.goods-info { padding: 8px; }
.goods-name { font-size: 13px; color: #333; margin-bottom: 4px; }
.goods-price { font-size: 16px; color: #FF9800; font-weight: bold; }
.goods-btn { background: #2E7D32; color: white; border: none; width: 100%; padding: 6px; border-radius: 4px; font-size: 12px; cursor: pointer; margin-top: 6px; }

/* 露营页面 */
.camp-card { background: white; border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
.camp-img { width: 100%; height: 180px; object-fit: cover; }
.camp-info { padding: 12px; }
.camp-name { font-size: 15px; font-weight: bold; margin-bottom: 4px; }
.camp-desc { font-size: 12px; color: #666; margin-bottom: 8px; }
.camp-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.camp-tag { background: #f0f7f0; color: #2E7D32; padding: 2px 8px; border-radius: 10px; font-size: 11px; }

/* 我的页面 */
.profile-header {
  background: linear-gradient(135deg, #2E7D32, #4CAF50);
  color: white;
  padding: 30px 16px;
  text-align: center;
}

.avatar { width: 70px; height: 70px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.3); font-size: 36px; line-height: 70px; background: rgba(255,255,255,0.2); margin: 0 auto 10px; }
.nickname { font-size: 18px; font-weight: bold; }

.profile-stats { display: flex; justify-content: space-around; padding: 16px; background: white; margin-bottom: 12px; border-radius: 12px; }
.profile-stat { text-align: center; }
.profile-stat-num { font-size: 18px; font-weight: bold; color: #2E7D32; }
.profile-stat-label { font-size: 11px; color: #999; }

.menu-list { background: white; border-radius: 12px; overflow: hidden; }
.menu-item { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
.menu-item:last-child { border-bottom: none; }
.menu-item-left { display: flex; align-items: center; gap: 10px; }
.menu-icon { font-size: 20px; }
.menu-name { font-size: 14px; color: #333; }
.menu-arrow { color: #ccc; font-size: 16px; }

/* 收藏/历史/点评列表 */
.list-card { background: white; border-radius: 12px; padding: 12px; margin-bottom: 10px; display: flex; gap: 12px; cursor: pointer; }
.list-thumb { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
.list-info { flex: 1; }
.list-title { font-size: 14px; font-weight: bold; color: #333; margin-bottom: 4px; }
.list-meta { font-size: 12px; color: #999; }

/* 评论区 */
.comment-item { padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
.comment-user { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.comment-avatar { width: 32px; height: 32px; border-radius: 50%; background: #e0e0e0; font-size: 16px; text-align: center; line-height: 32px; }
.comment-name { font-size: 13px; font-weight: bold; color: #333; }
.comment-text { font-size: 13px; color: #555; line-height: 1.6; }
.comment-time { font-size: 11px; color: #bbb; margin-top: 4px; }

/* 留言板 */
.message-board { background: white; border-radius: 12px; padding: 16px; }
.message-input-wrap { display: flex; gap: 8px; margin-bottom: 16px; }
.message-input { flex: 1; padding: 10px; border: 1px solid #e0e0e0; border-radius: 20px; outline: none; font-size: 13px; }
.message-send { background: #2E7D32; color: white; border: none; padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; }

/* 点赞 */
.like-btn { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #999; cursor: pointer; }
.like-btn.liked { color: #FF6B6B; }
.like-icon { font-size: 16px; }

/* 分享弹窗 */
.share-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: flex-end; }
.share-modal.show { display: flex; }
.share-panel { background: white; width: 100%; padding: 20px; border-radius: 16px 16px 0 0; }
.share-title { text-align: center; font-size: 14px; color: #666; margin-bottom: 16px; }
.share-icons { display: flex; justify-content: space-around; }
.share-icon-item { text-align: center; cursor: pointer; }
.share-icon-item span { font-size: 40px; display: block; margin-bottom: 6px; }
.share-icon-item small { font-size: 12px; color: #666; }
.share-close { margin-top: 12px; text-align: center; color: #999; padding: 10px; cursor: pointer; }

/* 加载更多 */
.load-more { text-align: center; padding: 16px; color: #999; font-size: 13px; cursor: pointer; }

/* 页面切换动画 */
.page { display: none; }
.page.active { display: block; animation: fadeIn 0.2s; }

/* 表单页面 */
.form-page { padding: 20px 16px; }
.form-card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.form-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
.form-row:last-child { border-bottom: none; }
.form-row-label { width: 100px; font-size: 14px; color: #666; flex-shrink: 0; }
.form-row-value { flex: 1; font-size: 14px; color: #333; }

/* 响应式 */
@media (max-width: 375px) {
  .func-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .func-item { padding: 12px 4px; }
  .func-text { font-size: 11px; }
}

/* 公告版面 */
.announcement-section {
  background: white;
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  border-left: 4px solid #FF9800;
}
.announcement-header { display: flex; align-items: center; margin-bottom: 10px; }
.announcement-item {
  padding: 8px 0;
  border-bottom: 1px solid #f0f0f0;
  cursor: pointer;
}
.announcement-item:last-child { border-bottom: none; }
.announcement-title { font-size: 14px; color: #333; font-weight: bold; margin-bottom: 2px; }
.announcement-meta { font-size: 11px; color: #999; }
.announcement-content { font-size: 13px; color: #666; margin-top: 4px; line-height: 1.6; display: block; }
.announcement-item.expanded .announcement-content { display: block; }
</style>

// 从云端拉取最新数据
(function() {
  var t = Date.now();
  var s = document.createElement("script");
  s.src = "https://chenhaijun770528.github.io/village-h5/cloud_data.js?t=" + t;
  s.onload = function() {
    if (window.CLOUD_DATA) {
      Object.keys(window.CLOUD_DATA).forEach(function(key) {
        try { localStorage.setItem("village_" + key, JSON.stringify(window.CLOUD_DATA[key])); } catch(e) {}
      });
      console.log("Cloud data loaded");
    }
  };
  document.head.appendChild(s);
})();
</script>

// 工具函数
function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5) }

function formatTime(ts) {
  const d = new Date(ts)
  const now = Date.now()
  const diff = now - ts
  if (diff < 60000) return '刚刚'
  if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前'
  if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前'
  return d.toLocaleDateString('zh-CN')
}

function toast(msg, duration = 2000) {
  const existing = document.querySelector('.toast')
  if (existing) existing.remove()
  const el = document.createElement('div')
  el.className = 'toast'
  el.textContent = msg
  document.body.appendChild(el)
  setTimeout(() => el.remove(), duration)
}

}

// 数据迁移：将旧key的数据合并到新key（防止更新后数据丢失）
function migrateData() {
  // 从 registered_users 迁移
  try {
    var old = localStorage.getItem('registered_users');
    if (old) {
      var arr = JSON.parse(old);
      if (Array.isArray(arr) && arr.length > 0) {
        var cur = Storage.get('registrations', []);
        arr.forEach(function(item) {
          if (!cur.find(function(c) { return c.id === item.id; })) {
            cur.push(item);
          }
        });
        Storage.set('registrations', cur);
        console.log('✅ 从 registered_users 迁移了', arr.length, '条数据');
      }
    }
  } catch(e) {}
  
  // 从 village_registrations 迁移
  try {
    var old2 = localStorage.getItem('village_registrations');
    if (old2) {
      var arr2 = JSON.parse(old2);
      if (Array.isArray(arr2) && arr2.length > 0) {
        var cur2 = Storage.get('registrations', []);
        arr2.forEach(function(item) {
          if (!cur2.find(function(c) { return c.id === item.id; })) {
            cur2.push(item);
          }
        });
        Storage.set('registrations', cur2);
        console.log('✅ 从 village_registrations 迁移了', arr2.length, '条数据');
      }
    }
  } catch(e) {}
}

    function toggleAnnouncement(idx) {
      var el = document.getElementById('annContent' + idx);
      if (!el) return;
      var parent = el.parentElement;
      if (parent.classList.contains('expanded')) {

      } else {
        parent.classList.add('expanded');
      }
    }

    function formatAnnTime(ts) {

      if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
      if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
      return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();

  for (var mi = 0; mi < regs.length; mi++) {
    if (regs[mi].role === '按摩师' && regs[mi].status === '已通过') {
      approvedMassage.push(regs[mi]);
    }
  }
  
  var section = document.getElementById('massageSection');
  if (!section) return;
  
  if (approvedMassage.length === 0) {
    section.style.display = 'none';
    return;
  }
  
  section.style.display = 'block';
  var list = section.querySelector('.massage-list');
  if (!list) return;
  
  var html = '';
  for (var si = 0; si < approvedMassage.length; si++) {
    var m = approvedMassage[si];
    html += '<div class="massage-card" onclick="goMassageDetail('' + (m.id || '') + '')" style="display:flex;align-items:center;gap:12px;padding:12px;background:white;border-radius:8px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.08);cursor:pointer;">';

    html += '<div style="flex:1;">';
    html += '<div style="font-weight:bold;color:#333;font-size:15px;">' + (m.name || '未知') + '</div>';
    html += '<div style="color:#666;font-size:12px;margin-top:2px;">' + (m.skill || '专业按摩') + ' | ' + (m.years || '经验丰富') + '</div>';
    html += '<div style="color:#999;font-size:11px;margin-top:2px;">📞 ' + (m.phone || '') + '</div>';
    html += '</div>';
    html += '<div style="color:#2E7D32;font-size:13px;font-weight:bold;">在线</div>';
    html += '</div>';
  }
  list.innerHTML = html;
}
