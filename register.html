<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册账号 - 村庄平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #2E7D32, #4CAF50);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .reg-box {
      background: white;
      border-radius: 16px;
      padding: 36px 28px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .reg-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .reg-header .icon { font-size: 48px; display: block; margin-bottom: 8px; }
    .reg-header .title { font-size: 20px; font-weight: bold; color: #2E7D32; }
    .reg-header .subtitle { font-size: 13px; color: #999; margin-top: 4px; }
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 13px; color: #666; margin-bottom: 6px; display: block; font-weight: 500; }
    .form-input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: #2E7D32; }
    .btn-reg {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #2E7D32, #388E3C);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-reg:active { transform: scale(0.98); }
    .btn-login-link {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #999;
    }
    .btn-login-link a { color: #2E7D32; text-decoration: none; font-weight: 500; }
    .error-msg { color: #F44336; font-size: 12px; margin-top: 4px; min-height: 16px; }
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 9999;
    }
    .strength {
      display: flex;
      gap: 4px;
      margin-top: 6px;
    }
    .strength-bar {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: #e0e0e0;
    }
    .strength-bar.active.weak { background: #F44336; }
    .strength-bar.active.medium { background: #FF9800; }
    .strength-bar.active.strong { background: #4CAF50; }
  </style>
</head>
<body>
  <div class="reg-box">
    <div class="reg-header">
      <span class="icon">🏘️</span>
      <div class="title">创建账号</div>
      <div class="subtitle">加入村庄开发平台</div>
    </div>

    <div id="regForm">
      <div class="form-group">
        <label class="form-label">设置账号 *</label>
        <input class="form-input" id="account" placeholder="4-20位字母或数字">
        <div class="error-msg" id="accountErr"></div>
      </div>
      <div class="form-group">
        <label class="form-label">设置密码 *</label>
        <input class="form-input" id="password" type="password" placeholder="至少6位密码" oninput="checkStrength()">
        <div class="strength" id="strength">
          <div class="strength-bar" id="sb1"></div>
          <div class="strength-bar" id="sb2"></div>
          <div class="strength-bar" id="sb3"></div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">确认密码 *</label>
        <input class="form-input" id="password2" type="password" placeholder="再次输入密码">
        <div class="error-msg" id="pw2Err"></div>
      </div>
      <div class="error-msg" id="errorMsg"></div>
      <button class="btn-reg" onclick="doRegister()">注册账号</button>
      <div class="btn-login-link">已有账号？<a href="login.html">立即登录</a></div>
    </div>
  </div>

  <script>
    var Storage = {
      get: function(key, defaultVal) {
        try {
          var v = localStorage.getItem('village_' + key);
          return v ? JSON.parse(v) : defaultVal;
        } catch(e) { return defaultVal; }
      },
      set: function(key, val) {
        localStorage.setItem('village_' + key, JSON.stringify(val));
      }
    };

    function toast(msg) {
      var el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(function() { el.remove(); }, 2000);
    }

    function checkStrength() {
      var pw = document.getElementById('password').value;
      var s1 = document.getElementById('sb1');
      var s2 = document.getElementById('sb2');
      var s3 = document.getElementById('sb3');
      var bars = [s1, s2, s3];
      bars.forEach(function(b) { b.className = 'strength-bar'; });

      if (pw.length === 0) return;
      var lvl = 0;
      if (pw.length >= 6) lvl++;
      if (/[0-9]/.test(pw) && /[a-zA-Z]/.test(pw)) lvl++;
      if (/[!@#$%^&*]/.test(pw) || pw.length >= 10) lvl++;
      lvl = Math.min(lvl, 3);

      var cls = ['', 'weak', 'medium', 'strong'];
      for (var i = 0; i < lvl; i++) {
        bars[i].classList.add('active', cls[lvl]);
      }
    }

    function doRegister() {
      var account = document.getElementById('account').value.trim();
      var password = document.getElementById('password').value.trim();
      var password2 = document.getElementById('password2').value.trim();
      var accountErr = document.getElementById('accountErr');
      var pw2Err = document.getElementById('pw2Err');
      var errorMsg = document.getElementById('errorMsg');

      accountErr.textContent = '';
      pw2Err.textContent = '';
      errorMsg.textContent = '';

      // 验证
      if (!account || account.length < 4 || account.length > 20) {
        accountErr.textContent = '账号4-20位字母或数字';
        return;
      }
      if (!/^[a-zA-Z0-9]+$/.test(account)) {
        accountErr.textContent = '账号只能包含字母和数字';
        return;
      }
      if (!password || password.length < 6) {
        errorMsg.textContent = '密码至少6位';
        return;
      }
      if (password !== password2) {
        pw2Err.textContent = '两次密码不一致';
        return;
      }

      // 检查账号是否已存在
      var accounts = Storage.get('accounts', []);
      for (var i = 0; i < accounts.length; i++) {
        if (accounts[i].account === account) {
          errorMsg.textContent = '该账号已被注册';
          return;
        }
      }

      // 创建账号
      var newAccount = {
        id: 'acc_' + Date.now(),
        account: account,
        password: password,
        currentRole: 'none',
        currentRoleId: '',
        status: 'active',
        createTime: Date.now()
      };

      accounts.unshift(newAccount);
      Storage.set('accounts', accounts);

      toast('注册成功！请登录');
      setTimeout(function() { location.href = 'login.html'; }, 1500);
    }

    document.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') doRegister();
    });
  </script>
<script src="cloud_db.js"></script>
</body>
</html>
