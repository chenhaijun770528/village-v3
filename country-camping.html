  <style>/* village-h5 全局样式 */
/* 主题色：绿色乡土风格 #2E7D32 */

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background-color: #f5f5f5;
  color: #333;
  font-size: 14px;
  line-height: 1.5;
}

/* 顶部导航 */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: linear-gradient(135deg, #2E7D32, #4CAF50);
  color: white;
  padding: 12px 16px;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.header-title { font-size: 18px; font-weight: bold; }
.header-back { font-size: 20px; cursor: pointer; padding: 4px 8px; }

/* 主容器 */
.container {
  padding: 60px 16px 80px;
  max-width: 750px;
  margin: 0 auto;
}

/* 露营卡片 */
.camp-list { display: flex; flex-direction: column; gap: 12px; }
.camp-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
.camp-img { width: 100%; height: 180px; object-fit: cover; }
.camp-info { padding: 12px; }
.camp-name { font-size: 15px; font-weight: bold; margin-bottom: 4px; }
.camp-desc { font-size: 12px; color: #666; margin-bottom: 8px; }
.camp-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.camp-tag { background: #f0f7f0; color: #2E7D32; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
.camp-price { font-size: 18px; color: #FF9800; font-weight: bold; margin-top: 8px; }

/* 底部导航 */
.tab-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 8px 0;
  box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
  z-index: 100;
}

.tab-item {
  text-align: center;
  cursor: pointer;
  padding: 4px 0;
}

.tab-icon { font-size: 24px; display: block; }
.tab-text { font-size: 11px; color: #999; margin-top: 2px; }
.tab-item.active .tab-text { color: #2E7D32; }

/* 悬浮按钮 */
.fab {
  position: fixed;
  right: 20px;
  bottom: 90px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, #2E7D32, #4CAF50);
  color: white;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  box-shadow: 0 4px 12px rgba(46,125,50,0.4);
  cursor: pointer;
  z-index: 200;
}

.fab:active { transform: scale(0.9); }

/* 我的申请按钮 */
.my-app-btn {
  position: fixed;
  right: 20px;
  bottom: 154px;
  background: white;
  color: #2E7D32;
  border: 1px solid #2E7D32;
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 12px;
  display: none;
  cursor: pointer;
  z-index: 200;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.my-app-btn:active { background: #f0f7f0; }

/* 弹窗遮罩 */
.modal-mask {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  justify-content: center;
  align-items: flex-end;
}

.modal-mask.show { display: flex; }

/* 弹窗面板 */
.modal-panel {
  background: white;
  width: 100%;
  max-height: 85vh;
  border-radius: 16px 16px 0 0;
  padding: 20px 16px;
  overflow-y: auto;
  animation: slideUp 0.3s;
}

@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.modal-panel h3 {
  text-align: center;
  font-size: 16px;
  color: #333;
  margin-bottom: 16px;
}

.modal-close {
  text-align: center;
  color: #999;
  padding: 10px;
  cursor: pointer;
  font-size: 14px;
}

/* 表单样式 */
.form-group { margin-bottom: 16px; }
.form-label { font-size: 14px; color: #666; margin-bottom: 6px; display: block; }
.form-input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

.form-input:focus { border-color: #2E7D32; }

.btn-primary {
  width: 100%;
  padding: 12px;
  background: #2E7D32;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

.btn-primary:active { background: #1B5E20; }

/* 申请卡片 */
.app-card {
  background: white;
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 10px;
  border-left: 4px solid #FF9800;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

.app-card.status-pass { border-left-color: #4CAF50; }
.app-card.status-reject { border-left-color: #F44336; }

.app-card-top {

  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}

.app-card-name { font-size: 14px; font-weight: bold; color: #333; }
.app-card-status { font-size: 12px; }
.app-card-status.waiting { color: #FF9800; }
.app-card-status.pass { color: #4CAF50; }
.app-card-status.reject { color: #F44336; }

.app-card-info { font-size: 12px; color: #999; margin-bottom: 8px; }
.app-card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.app-card-actions button {
  padding: 4px 12px;
  border-radius: 4px;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid #e0e0e0;
  background: white;
}

.app-card-actions .btn-edit { color: #2E7D32; border-color: #2E7D32; }
.app-card-actions .btn-delete { color: #F44336; border-color: #F44336; }

/* 图片预览 */
.img-preview {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 8px;
  margin-top: 8px;
  display: none;
}

/* Toast提示 */
.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.75);
  color: white;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 9999;
  animation: fadeIn 0.3s;
}

@keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }

/* 空状态 */
.empty-state { text-align: center; padding: 60px 20px; color: #999; }
.empty-icon { font-size: 48px; display: block; margin-bottom: 12px; }

/* 待审核卡片样式 */
.pending-card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  border: 2px solid #FF9800;
  margin-bottom: 12px;
}

.pending-badge {
  background: #FF9800;
  color: white;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  display: inline-block;
  margin-bottom: 6px;
}
</style>

function toast(msg, duration) {
  duration = duration || 2000;
  var existing = document.querySelector('.toast');
  if (existing) existing.remove();
  var el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, duration);
}

// Canvas图片压缩
function compressImage(file, maxWidth, maxHeight, quality, callback) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      var ctx = canvas.getContext('2d');
      var width = img.width;
      var height = img.height;
      if (width > maxWidth) {
        height = (height * maxWidth) / width;
        width = maxWidth;
      }
      if (height > maxHeight) {
        width = (width * maxHeight) / height;
        height = maxHeight;
      }
      canvas.width = width;
      canvas.height = height;
      ctx.drawImage(img, 0, 0, width, height);
      callback(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// 加载露营列表（正式列表 + 村长待审核申请）
function loadCamps() {
  var list = document.getElementById('campList');
  var camps = Storage.get('camps', []);
  var user = Storage.get('user', null);
  var isVillageChief = user && user.role === '村主任';

  var pendingApps = [];
  if (isVillageChief) {
    var allApps = Storage.get('camp_applications', []);
    var villages = Storage.get('villages', []);
    var chiefVillageId = null;
    for (var vi = 0; vi < villages.length; vi++) {
      if (villages[vi].chief && villages[vi].chief.name === user.nickName) {
        chiefVillageId = villages[vi].id;
        break;
      }
    }
    for (var ai = 0; ai < allApps.length; ai++) {
      if (allApps[ai].villageId === chiefVillageId && allApps[ai].status === 'waiting') {
        pendingApps.push(allApps[ai]);
      }
    }
  }

  var displayItems = [];
  for (var pi = 0; pi < camps.length; pi++) {
    displayItems.push({ type: 'camp', data: camps[pi] });
  }
  for (var ai2 = 0; ai2 < pendingApps.length; ai2++) {
    displayItems.push({ type: 'pending', data: pendingApps[ai2] });
  }

  list.innerHTML = '';

  if (displayItems.length === 0) {
    list.innerHTML = '<div class="empty-state"><span class="empty-icon">⛺</span><div>暂无露营基地</div></div>';
    return;
  }

  for (var i = 0; i < displayItems.length; i++) {
    var item = displayItems[i];
    var el = document.createElement('div');

    if (item.type === 'pending') {
      // 待审核申请卡片（村长视角）
      var tagsHtml = '';
      if (item.data.tags && item.data.tags.length > 0) {
        var tagsArr = typeof item.data.tags === 'string' ? item.data.tags.split(',') : item.data.tags;
        tagsHtml = '<div class="camp-tags">';
        for (var ti = 0; ti < tagsArr.length; ti++) {
          tagsHtml += '<span class="camp-tag">' + tagsArr[ti] + '</span>';
        }
        tagsHtml += '</div>';
      }
      var imgHtml = item.data.img
        ? '<img src="' + item.data.img + '" style="width:100%;height:180px;object-fit:cover;" onerror="this.parentElement.innerHTML=\'<div style=height:180px;background:#fff3e0;display:flex;align-items:center;justify-content:center;font-size:64px;>⏳</div>\'">'
        : '<div style="height:180px;background:#fff3e0;display:flex;align-items:center;justify-content:center;font-size:64px;">⏳</div>';
      el.className = 'pending-card';
      el.innerHTML =
        '<div style="position:relative;">' + imgHtml + '</div>' +
        '<div class="camp-info">' +
        '<span class="pending-badge">待审核</span> ' +
        '<span class="camp-name" style="color:#FF9800;">' + item.data.name + '</span>' +
        '<div class="camp-desc">申请人：' + item.data.userName + ' | 村庄：' + item.data.village + '</div>' +
        '<div class="camp-desc">' + (item.data.desc || '') + '</div>' +
        tagsHtml +
        '<div class="camp-price">¥' + item.data.price + '<span style="font-size:12px;color:#999;font-weight:normal;">/' + item.data.unit + '</span></div>' +
        '<div style="display:flex;gap:8px;margin-top:10px;">' +
        '<button class="goods-btn" style="background:#4CAF50;flex:1;" onclick="approveItem(\'' + item.data.id + '\')">✅ 通过</button>' +
        '<button class="goods-btn" style="background:#F44336;flex:1;" onclick="rejectItem(\'' + item.data.id + '\')">❌ 拒绝</button>' +
        '</div>' +
        '</div>';
    } else {
      // 正式露营卡片
      var c = item.data;
      var tagsArr = c.tags && c.tags.length > 0 ? c.tags : [];
      var tagsHtml2 = '<div class="camp-tags">';
      for (var ti2 = 0; ti2 < tagsArr.length; ti2++) {
        tagsHtml2 += '<span class="camp-tag">' + tagsArr[ti2] + '</span>';
      }
      tagsHtml2 += '</div>';
      var campImg = c.img
        ? '<img src="' + c.img + '" style="width:100%;height:180px;object-fit:cover;" onerror="this.parentElement.innerHTML=\'<div style=height:180px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:64px;>⛺</div>\'">'
        : '<div style="height:180px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:64px;">⛺</div>';
      el.className = 'camp-card';
      el.innerHTML =
        '<div class="camp-img">' + campImg + '</div>' +
        '<div class="camp-info">' +
        '<div class="camp-name">' + c.name + '</div>' +
        '<div class="camp-desc">' + (c.desc || '暂无描述') + '</div>' +
        tagsHtml2 +
        '<div class="camp-price">¥' + (c.price || '0') + '<span style="font-size:12px;color:#999;font-weight:normal;">/' + (c.unit || '次') + '</span></div>' +
        '<button class="goods-btn" style="margin-top:8px;" onclick="location.href=\'camp-order.html?id=' + c.id + '\'">📅 立即预订</button>' +
        '</div>';
    }

    list.appendChild(el);
  }
}

// 通过申请
function approveItem(appId) {
  if (!confirm('确定通过此申请？通过后该露营基地将上架。')) return;

  var apps = Storage.get('camp_applications', []);
  var app = null;
  var appIdx = -1;
  for (var i = 0; i < apps.length; i++) {
    if (apps[i].id === appId) { app = apps[i]; appIdx = i; break; }
  }
  if (!app) { toast('申请不存在'); return; }

  apps[appIdx].status = 'pass';
  apps[appIdx].updateTime = Date.now();
  Storage.set('camp_applications', apps);

  var camps = Storage.get('camps', []);
  camps.push({
    id: app.id,
    name: app.name,
    desc: app.desc || '',
    price: app.price,
    unit: app.unit,
    tags: app.tags || [],
    village: app.village,
    villageId: app.villageId,
    img: app.img || '',
    createTime: Date.now()
  });
  Storage.set('camps', camps);

  toast('已通过申请，露营基地已上架');
  loadCamps();
}

// 拒绝申请
function rejectItem(appId) {
  if (!confirm('确定拒绝此申请？')) return;

  var apps = Storage.get('camp_applications', []);
  for (var i = 0; i < apps.length; i++) {
    if (apps[i].id === appId) {
      apps[i].status = 'reject';
      apps[i].updateTime = Date.now();
      break;
    }
  }
  Storage.set('camp_applications', apps);
  toast('已拒绝该申请');
  loadCamps();
}

// ========== 村民申请功能 ==========

function checkLoginAndVillager() {
  var user = Storage.get('user', null);
  if (!user) { toast('请先登录'); return null; }
  var role = user.role || '';
  if (role !== '村民' && role !== '村主任') { toast('仅村民可申请上架'); return null; }
  return user;
}

function updateFabVisibility() {
  var user = Storage.get('user', null);
  if (!user) {
    document.getElementById('fabBtn').style.display = 'none';
    document.getElementById('myAppBtn').style.display = 'none';
    return;
  }
  var role = user.role || '';
  if (role === '村民' || role === '村主任') {
    document.getElementById('fabBtn').style.display = 'flex';
    document.getElementById('myAppBtn').style.display = 'block';
  } else {
    document.getElementById('fabBtn').style.display = 'none';
    document.getElementById('myAppBtn').style.display = 'none';
  }
}

var _campImages = [];  // 多图片数组
var currentApplyImgBase64 = '';  // 兼容旧代码

function openApplyModal(appId) {
  var user = checkLoginAndVillager();
  if (!user) return;

  document.getElementById('applyName').value = '';
  document.getElementById('applyPrice').value = '';
  document.getElementById('applyUnit').value = '';
  document.getElementById('applyDesc').value = '';
  document.getElementById('applyTags').value = '';
  document.getElementById('applyImgInput').value = '';
  document.getElementById('applyImgPreview').style.display = 'none';
  document.getElementById('applyEditId').value = '';
  currentApplyImgBase64 = '';
  document.getElementById('applyModalTitle').textContent = '申请上架露营基地';

  var villageSelect = document.getElementById('applyVillage');
  var villages = Storage.get('villages', []);
  var options = '';
  for (var vi = 0; vi < villages.length; vi++) {
    options += '<option value="' + villages[vi].id + '">' + villages[vi].name + '</option>';
  }
  villageSelect.innerHTML = options;

  for (var ci = 0; ci < villages.length; ci++) {
    if (villages[ci].chief && villages[ci].chief.name === user.nickName) {
      villageSelect.value = villages[ci].id;
      break;
    }
  }

  if (appId) {
    document.getElementById('applyModalTitle').textContent = '编辑露营基地申请';
    document.getElementById('applyEditId').value = appId;

    var apps = Storage.get('camp_applications', []);
    for (var ei = 0; ei < apps.length; ei++) {
      if (apps[ei].id === appId) {
        document.getElementById('applyName').value = apps[ei].name;
        document.getElementById('applyPrice').value = apps[ei].price;
        document.getElementById('applyUnit').value = apps[ei].unit;
        document.getElementById('applyDesc').value = apps[ei].desc || '';
        var tagsVal = apps[ei].tags ? apps[ei].tags.join(',') : '';
        document.getElementById('applyTags').value = tagsVal;
        document.getElementById('applyVillage').value = apps[ei].villageId || apps[ei].village;
        if (apps[ei].img) {
          currentApplyImgBase64 = apps[ei].img;
          var preview = document.getElementById('applyImgPreview');
          preview.src = apps[ei].img;
          preview.style.display = 'block';
        }
        break;
      }
    }
  }

  document.getElementById('applyModal').classList.add('show');
}

function closeApplyModal() {
  document.getElementById('applyModal').classList.remove('show');
}

function previewApplyImg(event) {
  var files = event.target.files;
  if (!files || files.length === 0) return;
  
  // 限制最多6张
  var remaining = 6 - _campImages.length;
  if (remaining <= 0) {
    toast('最多上传6张图片');
    return;
  }
  
  var filesToProcess = Array.from(files).slice(0, remaining);
  var processed = 0;
  
  filesToProcess.forEach(function(file) {
    compressImage(file, 800, 600, 0.7, function(dataUrl) {
      _campImages.push(dataUrl);
      processed++;
      
      if (processed === filesToProcess.length) {
        renderCampImagePreview();
        toast('已添加 ' + processed + ' 张图片');
      }
    });
  });
}

function renderCampImagePreview() {
  var preview = document.getElementById('applyImgPreview');
  preview.innerHTML = '';
  
  _campImages.forEach(function(imgData, idx) {
    var imgContainer = document.createElement('div');
    imgContainer.style.cssText = 'display:inline-block;position:relative;margin:5px;';
    
    var img = document.createElement('img');
    img.src = imgData;
    img.style.cssText = 'width:80px;height:80px;object-fit:cover;border-radius:6px;';
    
    var deleteBtn = document.createElement('button');
    deleteBtn.innerHTML = '×';
    deleteBtn.style.cssText = 'position:absolute;top:-5px;right:-5px;width:20px;height:20px;border-radius:50%;background:#F44336;color:white;border:none;font-size:12px;';
    deleteBtn.onclick = function() {
      _campImages.splice(idx, 1);
      renderCampImagePreview();
    };
    
    imgContainer.appendChild(img);
    imgContainer.appendChild(deleteBtn);
    preview.appendChild(imgContainer);
  });
}

function submitApplication() {
  var user = checkLoginAndVillager();
  if (!user) return;

  var name = document.getElementById('applyName').value.trim();
  var price = document.getElementById('applyPrice').value.trim();
  var unit = document.getElementById('applyUnit').value.trim();
  var desc = document.getElementById('applyDesc').value.trim();
  var tags = document.getElementById('applyTags').value.trim();
  var villageId = document.getElementById('applyVillage').value;
  var editId = document.getElementById('applyEditId').value;

  if (!name || !price || !unit || !villageId) {
    toast('请填写完整信息');
    return;
  }

  var villages = Storage.get('villages', []);
  var villageName = '';
  for (var vi = 0; vi < villages.length; vi++) {
    if (villages[vi].id === villageId) { villageName = villages[vi].name; break; }
  }

  var apps = Storage.get('camp_applications', []);

  if (editId) {
    var found = false;
    for (var ei = 0; ei < apps.length; ei++) {
      if (apps[ei].id === editId) {
        if (apps[ei].userId !== user.id) { toast('无权编辑此申请'); return; }
        apps[ei].name = name;
        apps[ei].price = price;
        apps[ei].unit = unit;
        apps[ei].desc = desc;
        apps[ei].tags = tags ? tags.split(',') : [];
        apps[ei].villageId = villageId;
        apps[ei].village = villageName;
        apps[ei].imgs = _campImages.length > 0 ? _campImages : (apps[ei].imgs || []);
        apps[ei].img = (apps[ei].imgs && apps[ei].imgs[0]) || apps[ei].img || '';
        apps[ei].updateTime = Date.now();
        found = true;
        break;
      }
    }
    if (!found) { toast('申请不存在'); return; }
    toast('申请修改成功');
  } else {
    var newApp = {
      id: genId(),
      userId: user.id,
      userName: user.nickName,
      name: name,
      price: price,
      unit: unit,
      desc: desc,
      tags: tags ? tags.split(',') : [],
      villageId: villageId,
      village: villageName,
      imgs: _campImages,  // 多图片数组
      img: _campImages.length > 0 ? _campImages[0] : '',  // 兼容旧代码：第一张作为封面
      status: 'waiting',
      createTime: Date.now(),
      updateTime: Date.now()
    };
    apps.push(newApp);
    toast('申请提交成功');
  }

  Storage.set('camp_applications', apps);
  closeApplyModal();
}

function openMyApplications() {
  var user = Storage.get('user', null);
  if (!user) { toast('请先登录'); return; }

  var apps = Storage.get('camp_applications', []);
  var myApps = [];
  for (var i = 0; i < apps.length; i++) {
    if (apps[i].userId === user.id) myApps.push(apps[i]);
  }

  var listEl = document.getElementById('myAppList');

  if (myApps.length === 0) {
    listEl.innerHTML = '<div class="empty-state"><span class="empty-icon">📋</span><div>暂无申请记录</div></div>';
  } else {
    listEl.innerHTML = '';
    for (var mi = 0; mi < myApps.length; mi++) {
      var app = myApps[mi];
      var card = document.createElement('div');
      card.className = 'app-card status-' + app.status;
      var statusText = app.status === 'waiting' ? '待审核' : app.status === 'pass' ? '已通过' : '已拒绝';
      var tagsStr = app.tags ? app.tags.join(', ') : '';
      var imgHtml = app.img
        ? '<img src="' + app.img + '" style="width:60px;height:60px;object-fit:cover;border-radius:6px;margin-top:6px;" onerror="this.style.display=\'none\'">'
        : '';
      var actionsHtml = '';
      if (app.status === 'waiting') {
        actionsHtml =
          '<button class="btn-edit" onclick="openApplyModal(\'' + app.id + '\')">编辑</button>' +
          '<button class="btn-delete" onclick="deleteApplication(\'' + app.id + '\')">删除</button>';
      }
      card.innerHTML =
        '<div class="app-card-top">' +
        '<span class="app-card-name">' + app.name + '</span>' +
        '<span class="app-card-status ' + app.status + '">' + statusText + '</span>' +
        '</div>' +
        '<div class="app-card-info">价格：¥' + app.price + '/' + app.unit + ' | 村庄：' + app.village + '</div>' +
        (tagsStr ? '<div class="app-card-info">标签：' + tagsStr + '</div>' : '') +
        imgHtml +
        '<div class="app-card-actions" style="margin-top:8px;">' + actionsHtml + '</div>';
      listEl.appendChild(card);
    }
  }

  document.getElementById('myAppModal').classList.add('show');
}

function closeMyAppModal() {
  document.getElementById('myAppModal').classList.remove('show');
}

function deleteApplication(appId) {
  if (!confirm('确定要删除此申请吗？')) return;

  var user = Storage.get('user', null);
  var apps = Storage.get('camp_applications', []);
  var newApps = [];
  var deleted = false;
  for (var i = 0; i < apps.length; i++) {
    if (apps[i].id === appId) {
      if (apps[i].userId !== user.id) { toast('无权删除此申请'); return; }
      deleted = true;
    } else {
      newApps.push(apps[i]);
    }
  }
  if (!deleted) { toast('申请不存在'); return; }

  Storage.set('camp_applications', newApps);
  toast('删除成功');
  openMyApplications();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
