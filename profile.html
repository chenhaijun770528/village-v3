﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - 村庄平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #f5f5f5;
      color: #333;
      font-size: 14px;
    }
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #2E7D32, #4CAF50);
      color: white;
      padding: 12px 16px;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .header-title { font-size: 18px; font-weight: bold; }
    .header-back { font-size: 20px; cursor: pointer; padding: 4px 8px; }
    .container { padding: 60px 16px 80px; max-width: 750px; margin: 0 auto; }

    /* 用户信息卡 */
    .user-card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .user-avatar { font-size: 52px; }
    .user-info { flex: 1; }
    .user-name { font-size: 17px; font-weight: bold; color: #222; }
    .user-account { font-size: 12px; color: #999; margin-top: 3px; }
    .role-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      margin-top: 6px;
    }
    .role-none { background: #f5f5f5; color: #999; }
    .role-active { background: #E8F5E9; color: #2E7D32; }
    .role-pending { background: #FFF3E0; color: #E65100; }

    /* 快捷功能 */
    .section-title {
      font-size: 14px;
      font-weight: bold;
      color: #888;
      margin-bottom: 10px;
      padding-left: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .menu-list {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      margin-bottom: 16px;
    }
    .menu-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.15s;
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item:active { background: #f9f9f9; }
    .menu-icon { font-size: 22px; margin-right: 12px; }
    .menu-text { flex: 1; font-size: 15px; color: #333; }
    .menu-arrow { font-size: 18px; color: #ccc; }
    .menu-badge {
      background: #F44336;
      color: white;
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 10px;
      margin-right: 8px;
      font-weight: bold;
    }

    /* 村庄管理面板 */
    .village-panel {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .village-panel-title {
      font-size: 15px;
      font-weight: bold;
      color: #333;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* 审核列表项 */
    .audit-item {
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      border-left: 4px solid #FF9800;
    }
    .audit-item.approved { border-left-color: #4CAF50; }
    .audit-item.rejected { border-left-color: #F44336; }
    .audit-name { font-size: 14px; font-weight: bold; color: #333; }
    .audit-info { font-size: 12px; color: #888; margin: 3px 0; }
    .audit-actions { display: flex; gap: 8px; margin-top: 8px; }
    .audit-actions button {
      flex: 1;
      padding: 6px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-a-approve { background: #4CAF50; color: white; }
    .btn-a-reject { background: #F44336; color: white; }

    /* 弹窗 */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-box {
      background: white;
      border-radius: 14px;
      padding: 20px;
      width: 92%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-title {
      font-size: 18px;
      font-weight: bold;
      color: #333;
      margin-bottom: 16px;
      text-align: center;
    }
    .modal-form-group {
      margin-bottom: 12px;
    }
    .modal-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 4px;
      display: block;
    }
    .modal-label .req { color: #F44336; }
    .modal-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
    }
    .modal-input:focus { border-color: #2E7D32; }
    .modal-textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      height: 80px;
      resize: vertical;
      box-sizing: border-box;
    }
    .modal-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }
    .modal-btn-save { background: #2E7D32; color: white; }
    .modal-btn-cancel { background: #f5f5f5; color: #666; margin-top: 6px; }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 28px;
      color: #bbb;
      font-size: 14px;
    }

    /* 注册审核提示 */
    .pending-notice {
      background: #FFF8E1;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: #795548;
      margin-bottom: 16px;
      line-height: 1.6;
    }

    /* 退出按钮 */
    .btn-logout {
      width: 100%;
      padding: 13px;
      background: white;
      color: #F44336;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 9999;
    }
  </style>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
</head>
<body>
  <div class="header">
    <span class="header-back" onclick="history.back()">←</span>
    <span class="header-title">个人中心</span>
    <span style="width:40px"></span>
  </div>

  <div class="container" id="mainContent">
    加载中...
  </div>

  <script>
// SAFETY NET: prevent ReferenceError
var container = document.getElementById("mainContent");


    var Storage = {
      get: function(key, defaultVal) {
        try {
          var v = localStorage.getItem('village_' + key);
          return v ? JSON.parse(v) : defaultVal;
        } catch(e) { return defaultVal; }
      },
      set: function(key, val) {
        localStorage.setItem('village_' + key, JSON.stringify(val));
      }
    };

    var currentUser = Storage.get('user', null);
    if (!currentUser) {
      location.href = 'login.html';
    }

    // 兼容处理：如果 currentRole 是对象，转为字符串
    if (currentUser && currentUser.currentRole && typeof currentUser.currentRole === 'object') {
      var roleMap = { 'head': 'township', 'villager': 'villager', 'tourist': 'tourist' };
      var newRole = roleMap[currentUser.currentRole.role] || currentUser.currentRole.role || 'none';
      currentUser.nickName = currentUser.currentRole.roleName || currentUser.nickName || '';
      currentUser.currentRole = newRole;
      Storage.set('user', currentUser);
      console.log('[兼容] currentRole 已从对象转为字符串:', newRole);
    }

    var ROLES_MAP = {
      'township': { icon: '👔', name: '村主任', color: '#2E7D32' },
      'villager': { icon: '🏠', name: '村民', color: '#4CAF50' },
      'tourist': { icon: '🎒', name: '游客', color: '#2196F3' },
      'market': { icon: '🏪', name: '超市老板', color: '#FF9800' },
      'construction': { icon: '🏗️', name: '建筑公司', color: '#795548' },
      'teacher': { icon: '📚', name: '老师', color: '#9C27B0' },
      'student': { icon: '🎓', name: '大学生', color: '#00BCD4' },
      'lawyer': { icon: '⚖️', name: '律师', color: '#607D8B' },
      'truck': { icon: '🚛', name: '货运司机', color: '#8D6E63' },
      'carpool': { icon: '🚗', name: '顺风车', color: '#009688' },
      'massage': { icon: '💆', name: '按摩技师', color: '#E91E63' },
      'landscape': { icon: '🌿', name: '建筑园林设计师', color: '#795548' }
    };

    function toast(msg) {
      var el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(function() { el.remove(); }, 2000);
    }

    
// 全局错误捕获：卡住时显示错误信息
window.onerror = function(msg, url, line, col, error) {
  var errorEl = document.getElementById('mainContent');
  if (errorEl) {
    errorEl.innerHTML = '<div style="padding:20px;color:red;word-break:break-all;background:#fff;">' +
      '<h3>页面运行错误，请截图给开发者</h3>' +
      '<p><b>错误：</b>' + msg + '</p>' +
      '<p><b>位置：</b>行 ' + line + (col ? ', 列 ' + col : '') + '</p>' +
      '<p><b>堆栈：</b>' + (error && error.stack ? error.stack.toString().substring(0, 800) : '无') + '</p>' +
      '</div>';
  }
  return false;
};

function renderPage() {
  var container = document.getElementById("mainContent");
      var mainEl = document.getElementById('mainContent');
      var role = ROLES_MAP[currentUser.currentRole] || null;
      var roleText = '未选择角色';
      var roleCls = 'role-none';
      var roleTag = '<span class="role-badge role-none">❓ 未选择角色</span>';

      if (currentUser.currentRole && currentUser.currentRole !== 'none') {
        if (role) {
          roleText = role.name;
          roleTag = '<span class="role-badge role-active">' + role.icon + ' ' + role.name + '</span>';
        }
      }

      // 获取我的所有注册记录
      var regs = Storage.get('registrations', []);
      var myRegs = [];
      for (var i = 0; i < regs.length; i++) {
        if (regs[i].accountId === currentUser.id) {
          myRegs.push(regs[i]);
        }
      }

      // 查找待我审核的（村主任角色）
      var pendingForMe = [];
      if (currentUser.currentRole === 'township') {
        // 查找注册身份为"村民"且状态为"待审核"的（先收集所有，后面再按村庄过滤）
        for (var j = 0; j < regs.length; j++) {
          if (regs[j].role === '村民' && regs[j].status === '待审核') {
            pendingForMe.push(regs[j]);
          }
        }
      }

      var html = '';

      // 用户信息卡
      html += '<div class="user-card">' +
        '<div class="user-avatar">👤</div>' +
        '<div class="user-info">' +
        '<div class="user-name">' + currentUser.account + '</div>' +
        '<div class="user-account">账号：' + currentUser.account + '</div>' +
        (currentUser.phone ? '<div style="font-size:12px;color:#666;margin-top:4px;">📞 ' + currentUser.phone + '</div>' : '') +
        (currentUser.address ? '<div style="font-size:12px;color:#666;margin-top:2px;">📍 ' + (currentUser.address.length > 15 ? currentUser.address.substring(0, 15) + '...' : currentUser.address) + '</div>' : '') +
        roleTag +
        '<button onclick="openEditContactModal()" style="margin-top:8px;padding:6px 12px;background:#4CAF50;color:white;border:none;border-radius:6px;font-size:12px;cursor:pointer;width:100%;">✏️ 编辑联系方式</button>' +
        '</div>' +
        '</div>';

      // 待审核提示
      if (myRegs.length > 0) {
        var latestReg = myRegs[0];
        if (latestReg.status === '待审核') {
          html += '<div class="pending-notice">⏳ 您的「' + latestReg.role + '」申请正在审核中，请耐心等待。<br>审核通过后您将自动获得相应功能权限。</div>';
        } else if (latestReg.status === '已拒绝') {
          html += '<div class="pending-notice">❌ 您的「' + latestReg.role + '」申请已被拒绝，如有疑问请联系管理员。</div>';
        }
      }

      // 村主任专属：我的村庄按钮
      if (currentUser.currentRole === 'township') {
        // 查找当前用户对应的村庄
        var myVillage = null;
        var villages = Storage.get('villages', []);
        // 用多种方式查找当前用户的村庄（兼容 chief.name 不一致的问题）
        function findMyVillage(vills, user) {
          if (!user || !vills || !vills.length) return null;
          // 方式1: chief.name 匹配 currentRoleName
          for (var i=0;i<vills.length;i++){if(vills[i].chief&&vills[i].chief.name===user.currentRoleName)return vills[i];}
          // 方式2: chief.name 匹配 account
          for (var i=0;i<vills.length;i++){if(vills[i]&&vills[i].chief&&vills[i].chief.name===user.account)return vills[i];}
          // 方式3: chief.phone 匹配 user.phone
          for (var i=0;i<vills.length;i++){if(vills[i]&&vills[i].chief&&vills[i].chief.phone===user.phone)return vills[i];}
          // 方式4: 只有一个村庄时直接返回
          if (vills.length === 1 && user.currentRole === 'township') return vills[0];
          return null;
        }
        myVillage = findMyVillage(villages, currentUser);
        for (var vi = 0; vi < villages.length; vi++) {
          if (villages[vi].chief && villages[vi].chief.name === currentUser.nickName) {
            myVillage = villages[vi];
            break;
          }
        }
        
        // 过滤pendingForMe，只保留申请加入本村的
        if (myVillage) {
          pendingForMe = pendingForMe.filter(function(r) { return r.village === myVillage.name; });
        }
        // 没有村庄 → 创建入口
        if (!myVillage) {
          html += '<div class="village-panel">' +
            '<div class="village-panel-title">🏘️ 我的村庄</div>' +
            '<div style="text-align:center;padding:10px 0;">' +
            '<div style="font-size:48px;margin-bottom:8px;">🏡</div>' +
            '<div style="font-size:14px;color:#888;margin-bottom:12px;">您还没有村庄信息</div>' +
            '<button onclick="openVillageModal(true)" style="padding:10px 24px;background:#2E7D32;color:white;border:none;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;">创建村庄</button>' +
            '</div>' +
            '</div>';
        } else {
          html += '<div class="village-panel">' +
            '<div class="village-panel-title">🏘️ 我的村庄���' + myVillage.name + '」</div>' +
            '<div style="font-size:13px;color:#666;margin-bottom:12px;">' +
            '📍 ' + (myVillage.province || '') + ' ' + (myVillage.city || '') + '<br>' +
            '📞 村长：' + (myVillage.chief ? myVillage.chief.name : '未知') + ' ' + (myVillage.chief && myVillage.chief.phone ? myVillage.chief.phone : '') + '<br>' +
            '👥 人口：' + (myVillage.population || '待完善') + ' 人<br>' +
            '📐 总面积：' + (myVillage.totalArea || '待完善') + ' 亩 | 农田：' + (myVillage.farmlandArea || '待完善') + ' 亩<br>' +
            '🏠 地址：' + (myVillage.address || '待完善') + '<br>' +
            (myVillage.description ? '📝 ' + myVillage.description + '<br>' : '') +
            (myVillage.images && myVillage.images.length ? '<div style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap;">' + myVillage.images.map(function(img){ return '<img src="' + img + '" style="width:60px;height:60px;object-fit:cover;border-radius:8px;">'; }).join('') + '</div>' : '') +
            '</div>' +
            '<button onclick="openVillageModal(false)" style="width:100%;padding:10px;background:#2E7D32;color:white;border:none;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;margin-bottom:8px;">✏️ 编辑村庄信息</button>' +
            '</div>';
        }

        // 村主任审核村民申请
        html += '<div class="village-panel">' +
          '<div class="village-panel-title">👥 村民加入审核' +
          (pendingForMe.length > 0 ? ' <span style="background:#F44336;color:white;font-size:12px;padding:2px 8px;border-radius:10px;font-weight:bold;">' + pendingForMe.length + '</span>' : '') +
          '</div>';

        if (pendingForMe.length === 0) {
          html += '<div class="empty-state">暂无待审核的村民申请</div>';
        } else {
          for (var pi = 0; pi < pendingForMe.length; pi++) {
            var p = pendingForMe[pi];
            html += '<div class="audit-item">' +
              '<div class="audit-name">🏠 ' + (p.name || '未知') + '</div>' +
              '<div class="audit-info">村庄：' + (p.village || '未知') + ' | 手机：' + (p.phone || '未知') + '</div>' +
              '<div class="audit-info">申请时间：' + (p.applyTime ? new Date(p.applyTime).toLocaleDateString('zh-CN') : '') + '</div>' +
              '<div class="audit-actions">' +
              '<button class="btn-a-approve" onclick="approveVillager(\'' + p.id + '\')">✅ 通过</button>' +
              '<button class="btn-a-reject" onclick="rejectVillager(\'' + p.id + '\')">❌ 拒绝</button>' +
              '</div>' +
              '</div>';
          }
        }
        html += '</div>';
      }


      // ===== 村民：我的产品管理 =====
      if (currentUser.currentRole === 'villager') {
        html += '<div class="village-panel">' +
          '<div class="village-panel-title">🛍️ 我的产品管理</div>' +
          '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;">' +
            '<div onclick="showProductApps()" style="text-align:center;padding:12px;background:#f5f5f5;border-radius:8px;cursor:pointer;">' +
              '<div style="font-size:24px;">🥬</div><div style="font-size:12px;color:#666;margin-top:4px;">农产品</div>' +
            '</div>' +
            '<div onclick="showFoodApps()" style="text-align:center;padding:12px;background:#f5f5f5;border-radius:8px;cursor:pointer;">' +
              '<div style="font-size:24px;">🍜</div><div style="font-size:12px;color:#666;margin-top:4px;">美食</div>' +
            '</div>' +
            '<div onclick="showCampApps()" style="text-align:center;padding:12px;background:#f5f5f5;border-radius:8px;cursor:pointer;">' +
              '<div style="font-size:24px;">🏕️</div><div style="font-size:12px;color:#666;margin-top:4px;">露营地</div>' +
            '</div>' +
          '</div>' +
          '          <div id="myProductsPanel" style="background:#f9f9f9;border-radius:8px;padding:10px;margin-bottom:10px;display:none;">            <div style="font-size:12px;color:#666;margin-bottom:6px;font-weight:bold;">📦 我的产品（含待处理订单）</div>            <div id="myProductsList"></div>          </div>' +
          '<button onclick="showMyOrders()" style="width:100%;padding:10px;background:#2E7D32;color:white;border:none;border-radius:6px;font-size:14px;cursor:pointer;">📦 查看我的订单</button>' +
        '</div>';
      }

      // ===== 村主任：产品审核管理 =====
      if (currentUser.currentRole === 'township') {
        var pendingProducts = Storage.get('product_applications', []).filter(function(p) { 
          return (p.status === '待审核' || p.status === 'waiting') && (!myVillage || p.village === myVillage.name || p.village === ''); 
        });
        var pendingFood = Storage.get('food_applications', []).filter(function(f) { 
          return (f.status === '待审核' || f.status === 'waiting') && (!myVillage || f.villageId === myVillage.id); 
        });
        var pendingCamps = Storage.get('camp_applications', []).filter(function(camp) { 
          return (camp.status === '待审核' || camp.status === 'waiting') && (!myVillage || camp.villageId === myVillage.id); 
        });
        
        var totalPending = pendingProducts.length + pendingFood.length + pendingCamps.length;
        
        html += '<div class="village-panel">' +
          '<div class="village-panel-title">✅ 产品上架审核' + (totalPending > 0 ? ' <span style="background:#F44336;color:white;font-size:12px;padding:2px 8px;border-radius:10px;font-weight:bold;">' + totalPending + '</span>' : '') + '</div>' +

    // 图片选择 + Canvas压缩
    function previewVillageImages() {
      var files = document.getElementById('vf_images').files;
      if (!files || !files.length) return;
      var max = 6;
      var existing = window._villageImages || [];
      if (existing.length + files.length > max) {
        toast('最多上传6张图片');
        return;
      }
      var loaded = 0;
      for (var fi = 0; fi < files.length; fi++) {
        (function(file) {
          var reader = new FileReader();
          reader.onload = function(e) {
            var img = new Image();
            img.onload = function() {
              var canvas = document.createElement('canvas');
              var ctx = canvas.getContext('2d');
              var w = img.width, h = img.height;
              var maxDim = 800;
              if (w > maxDim || h > maxDim) {
                if (w > h) { h = h * maxDim / w; w = maxDim; }
                else { w = w * maxDim / h; h = maxDim; }
              }
              canvas.width = w; canvas.height = h;
              ctx.drawImage(img, 0, 0, w, h);
              var dataUrl = canvas.toDataURL('image/jpeg', 0.7);
              if (dataUrl.length > 200000) {
                dataUrl = canvas.toDataURL('image/jpeg', 0.5);
              }
              window._villageImages = window._villageImages || [];
              window._villageImages.push(dataUrl);
              renderVillageImagePreview();
              loaded++;
              if (loaded === files.length) {
                document.getElementById('vf_images').value = '';
              }
            };
            img.src = e.target.result;
          };
          reader.readAsDataURL(file);
        })(files[fi]);
      }
    }

    function previewSceneryImg() {
      var fileInput = document.getElementById("sf_imgFile");
      if (!fileInput.files || !fileInput.files.length) return;
      var file = fileInput.files[0];
      var reader = new FileReader();
      reader.onload = function(e) {
        var img = new Image();
        img.onload = function() {
          var maxW = 800, maxH = 600, quality = 0.7;
          var w = img.width, h = img.height;
          if (w > maxW || h > maxH) {
            var ratio = Math.min(maxW / w, maxH / h);
            w = Math.round(w * ratio);
            h = Math.round(h * ratio);
          }
          var canvas = document.createElement("canvas");
          canvas.width = w;
          canvas.height = h;
          var ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, w, h);
          window._sceneryTmpImg = canvas.toDataURL("image/jpeg", quality);
          var preview = document.getElementById("sf_imgPreview");
          if (preview) preview.innerHTML = '<img src="' + window._sceneryTmpImg + '" style="width:100%;max-height:150px;object-fit:cover;border-radius:8px;">';
          var cur = document.getElementById("sf_currentImg");
          if (cur) cur.style.display = "none";
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

        '<div style="display:flex;gap:10px;margin-top:10px;">' +

    // 编辑联系方式弹窗
    function openEditContactModal() {
      var user = Storage.get('user', null);
      if (!user) return;
      document.getElementById('editPhone').value = user.phone || '';
      document.getElementById('editAddress').value = user.address || '';
      document.getElementById('editContactModal').style.display = 'flex';
    }

    function saveContactInfo() {
      var phone = document.getElementById('editPhone').value.trim();
      var address = document.getElementById('editAddress').value.trim();
      if (!phone) { toast('请输入联系电话'); return; }
      if (!/^1[3-9]\d{9}$/.test(phone)) { toast('手机号码格式不正确'); return; }
      var user = Storage.get('user', null);
      if (!user) return;
      user.phone = phone;
      user.address = address;
      Storage.set('user', user);
      // 同时更新 accounts 数组中的信息
      var accounts = Storage.get('accounts', []);
      for (var i = 0; i < accounts.length; i++) {
        if (accounts[i].id === user.id) {
          accounts[i].phone = phone;
          accounts[i].address = address;
          break;
        }
      }
      Storage.set('accounts', accounts);
      document.getElementById('editContactModal').style.display = 'none';
      toast('保存成功！');
      renderPage(); // 重新渲染页面显示新信息
    }
    // 页面初始化
    function init() {
      renderPage();
    }
    
    init();
</script>
